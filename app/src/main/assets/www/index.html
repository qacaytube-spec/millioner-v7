<!doctype html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milyoner — Final Mobil Yarışma</title>
<meta name="description" content="Milyoner üslubunda mobil sual-cavab oyunu. Offline işləyir və ana ekrana əlavə edilə bilər.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Milyoner">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
<meta name="theme-color" content="#020617">
<meta name="application-name" content="Milyoner">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&family=Noto+Sans:wght@500;600;700;800;900&display=swap');

:root {
  --bg:#020617;
  --panel:rgba(15,23,42,.86);
  --panel2:rgba(30,41,59,.78);
  --gold:#ffd700;
  --gold-soft:#ffed9a;
  --blue:#2563eb;
  --purple:#7c3aed;
  --green:#10b981;
  --red:#ef4444;
  --text:#f8fafc;
  --muted:#a5b4fc;
}

* { box-sizing:border-box; margin:0; padding:0; }
html{
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
  touch-action:manipulation;
}
button, .btn, .option, .lang-card{
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
body {
  min-height:100vh;
  font-family:'Rajdhani', system-ui, sans-serif;
  background:
    radial-gradient(circle at 20% 10%, rgba(37,99,235,.38), transparent 34%),
    radial-gradient(circle at 80% 0%, rgba(124,58,237,.32), transparent 32%),
    radial-gradient(circle at bottom, rgba(255,215,0,.10), transparent 32%),
    var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

.stage-light {
  position:fixed;
  width:42vw;
  height:42vw;
  min-width:320px;
  min-height:320px;
  border-radius:50%;
  filter:blur(110px);
  opacity:.22;
  pointer-events:none;
  z-index:0;
}
.stage-light.left { background:#2563eb; left:-14vw; top:-14vw; animation:float 9s ease-in-out infinite; }
.stage-light.right { background:#7c3aed; right:-14vw; bottom:-14vw; animation:float 10s ease-in-out infinite reverse; }
@keyframes float { 50% { transform:translateY(26px) scale(1.04); } }

.app {
  width:min(1120px,94vw);
  margin:18px auto max(18px, env(safe-area-inset-bottom));
  position:relative;
  z-index:2;
}

.card {
  border-radius:28px;
  border:1px solid rgba(255,215,0,.24);
  background:linear-gradient(135deg, rgba(15,23,42,.88), rgba(2,6,23,.82));
  box-shadow:0 0 80px rgba(37,99,235,.18), 0 0 120px rgba(124,58,237,.14);
  overflow:hidden;
  backdrop-filter: blur(18px);
}

.header {
  padding:22px 20px 14px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.06);
  position:relative;
}
.title {
  font-family:'Orbitron', sans-serif;
  font-size:clamp(32px, 7vw, 76px);
  letter-spacing:5px;
  color:var(--gold);
  text-shadow:0 0 25px rgba(255,215,0,.55), 0 0 70px rgba(255,215,0,.24);
}
.subtitle {
  margin-top:6px;
  font-size:13px;
  letter-spacing:2px;
  color:var(--muted);
  text-transform:uppercase;
}
.stats {
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}
.pill {
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
  border-radius:999px;
  padding:7px 12px;
  font-weight:700;
  color:#e0e7ff;
  font-size:13px;
}
.pill.gold { color:#111827; background:linear-gradient(135deg, var(--gold), var(--gold-soft)); border:none; }

.screen { padding:20px; }
.start {
  text-align:center;
  padding:38px 18px 48px;
}
.logo-orb {
  width:160px;
  height:160px;
  border-radius:50%;
  margin:0 auto 22px;
  border:3px solid rgba(255,215,0,.54);
  display:grid;
  place-items:center;
  color:var(--gold);
  font-family:'Orbitron', sans-serif;
  font-size:52px;
  font-weight:800;
  box-shadow:inset 0 0 45px rgba(37,99,235,.38), 0 0 55px rgba(255,215,0,.22);
  animation:orb 3s ease-in-out infinite;
}
@keyframes orb { 50% { transform:scale(1.035); box-shadow:inset 0 0 58px rgba(124,58,237,.46), 0 0 72px rgba(255,215,0,.32); } }

.btn {
  border:none;
  border-radius:16px;
  padding:14px 24px;
  font-family:'Rajdhani', sans-serif;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  color:white;
  background:linear-gradient(135deg, var(--purple), var(--blue));
  transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
}
.btn:hover { transform:translateY(-3px); box-shadow:0 16px 36px rgba(37,99,235,.28); filter:brightness(1.08); }
.btn.secondary { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); color:#e9d5ff; font-size:15px; padding:10px 14px; }
.btn.danger { background:linear-gradient(135deg,#7f1d1d,#ef4444); }

.progress {
  display:flex;
  gap:4px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:14px;
}
.step {
  min-width:42px;
  text-align:center;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  padding:4px 7px;
  font-size:10px;
  color:rgba(255,255,255,.36);
}
.step.done { color:var(--gold); border-color:rgba(255,215,0,.32); background:rgba(255,215,0,.06); }
.step.current { color:#111827; background:linear-gradient(135deg,var(--gold),var(--gold-soft)); border-color:transparent; transform:scale(1.08); font-weight:800; }
.step.safe { border-color:rgba(16,185,129,.55); }

.topline {
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:12px;
  align-items:center;
  margin:8px 0 16px;
}
.money {
  text-align:center;
}
.money .label { color:#818cf8; font-size:12px; font-weight:700; }
.money .value { color:var(--gold); font-family:'Orbitron', sans-serif; font-size:clamp(20px,4vw,32px); text-shadow:0 0 18px rgba(255,215,0,.34); }
.timer {
  width:70px; height:70px; border-radius:50%;
  display:grid; place-items:center;
  border:3px solid rgba(255,215,0,.55);
  color:var(--gold);
  font-family:'Orbitron', sans-serif;
  font-size:22px;
  box-shadow:0 0 20px rgba(255,215,0,.16);
}
.timer.urgent { border-color:var(--red); color:var(--red); animation:pulse .65s infinite; }
@keyframes pulse { 50% { transform:scale(1.06); } }

.question-box {
  min-height:116px;
  border-radius:22px;
  padding:26px 22px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(135deg, rgba(15,23,42,.96), rgba(30,41,59,.90));
  border:2px solid rgba(255,215,0,.32);
  box-shadow:0 0 36px rgba(255,215,0,.12);
  position:relative;
  overflow:hidden;
}
.question-box::before {
  content:"";
  position:absolute;
  inset:0;
  transform:translateX(-110%);
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.075), transparent);
  animation:shine 5s infinite;
}
@keyframes shine { to { transform:translateX(110%); } }
.question-text {
  position:relative;
  z-index:1;
  font-size:clamp(18px, 3vw, 30px);
  line-height:1.35;
  font-weight:800;
}

.meta-row {
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin:12px 0 16px;
}
.tag {
  font-size:12px;
  border-radius:999px;
  padding:6px 12px;
  color:#fde68a;
  border:1px solid rgba(255,215,0,.26);
  background:rgba(255,215,0,.08);
  font-weight:800;
}

.options {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.option {
  min-height:66px;
  display:flex;
  gap:12px;
  align-items:center;
  width:100%;
  text-align:left;
  border-radius:18px;
  border:2px solid rgba(255,215,0,.18);
  background:linear-gradient(135deg,#172554,#1e3a8a);
  color:white;
  font-family:'Rajdhani', sans-serif;
  font-size:clamp(15px, 2vw, 19px);
  font-weight:800;
  padding:14px 16px;
  cursor:pointer;
  transition:.2s ease;
  user-select:none;
}
.option:hover:not(:disabled) {
  transform:translateY(-3px) scale(1.015);
  border-color:rgba(255,215,0,.66);
  box-shadow:0 12px 30px rgba(37,99,235,.30);
}
.option:disabled { cursor:not-allowed; opacity:.82; }
.option .letter {
  min-width:28px; height:28px; border-radius:50%;
  display:grid; place-items:center;
  background:rgba(255,215,0,.12);
  color:var(--gold);
  border:1px solid rgba(255,215,0,.35);
}
.option.selected {
  background:linear-gradient(135deg,#92400e,#d97706);
  border-color:#fbbf24;
  box-shadow:0 0 28px rgba(251,191,36,.34);
}
.option.correct {
  background:linear-gradient(135deg,#064e3b,#10b981);
  border-color:#6ee7b7;
}
.option.wrong {
  background:linear-gradient(135deg,#7f1d1d,#ef4444);
  border-color:#fca5a5;
}
.option.hidden {
  visibility:hidden;
}

.lifelines {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:16px 0 8px;
}
.info {
  margin-top:12px;
  text-align:center;
  color:#c4b5fd;
  min-height:24px;
  font-weight:700;
}
.end {
  text-align:center;
  padding:52px 18px;
}
.end .big {
  font-family:'Orbitron', sans-serif;
  color:var(--gold);
  font-size:clamp(34px,6vw,68px);
  margin:16px 0 24px;
}


@media(max-width:720px) {
  .options { grid-template-columns:1fr; }
  .topline { grid-template-columns:1fr; text-align:center; }
  .timer { margin:auto; }
  .screen { padding:14px; }
  .cinema-only { display:none; }
}

@media(prefers-reduced-motion: reduce) {
  * { animation:none !important; transition:none !important; }
}

/* ===== PHASE 3 — CINEMATIC GAMEPLAY UPGRADE ===== */

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  background:
    linear-gradient(115deg, transparent 0%, rgba(255,255,255,.035) 42%, transparent 58%),
    radial-gradient(circle at center, transparent 0%, rgba(0,0,0,.18) 72%);
  animation:cinemaSweep 7s linear infinite;
}
@keyframes cinemaSweep{
  0%{transform:translateX(-80%)}
  100%{transform:translateX(80%)}
}

.card{
  position:relative;
}
.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:30px;
  pointer-events:none;
  background:linear-gradient(135deg, rgba(255,215,0,.42), rgba(37,99,235,.18), rgba(124,58,237,.34), rgba(255,215,0,.28));
  opacity:.22;
  filter:blur(12px);
  z-index:-1;
  animation:premiumBorderGlow 5s ease-in-out infinite;
}
@keyframes premiumBorderGlow{
  50%{opacity:.48; filter:blur(18px)}
}

.title{
  position:relative;
}
.title::after{
  content:"";
  display:block;
  width:min(420px,70vw);
  height:2px;
  margin:10px auto 0;
  background:linear-gradient(90deg, transparent, rgba(255,215,0,.9), transparent);
  box-shadow:0 0 20px rgba(255,215,0,.55);
}

.screen{
  animation:screenIn .45s ease;
}
@keyframes screenIn{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

.logo-orb{
  position:relative;
}
.logo-orb::before{
  content:"";
  position:absolute;
  inset:-24px;
  border-radius:50%;
  border:1px solid rgba(255,215,0,.22);
  animation:orbRing 3s linear infinite;
}
.logo-orb::after{
  content:"";
  position:absolute;
  inset:-44px;
  border-radius:50%;
  border:1px dashed rgba(196,181,253,.25);
  animation:orbRing 7s linear infinite reverse;
}
@keyframes orbRing{
  to{transform:rotate(360deg)}
}

.question-box{
  animation:questionReveal .5s ease;
}
@keyframes questionReveal{
  from{opacity:0; transform:scale(.98) translateY(12px); filter:blur(6px)}
  to{opacity:1; transform:scale(1) translateY(0); filter:blur(0)}
}

.option{
  animation:optionIn .38s ease both;
}
.option:nth-child(1){animation-delay:.03s}
.option:nth-child(2){animation-delay:.08s}
.option:nth-child(3){animation-delay:.13s}
.option:nth-child(4){animation-delay:.18s}
@keyframes optionIn{
  from{opacity:0; transform:translateY(14px) scale(.985)}
  to{opacity:1; transform:translateY(0) scale(1)}
}

.option.selected{
  animation:selectedPulse .72s ease-in-out infinite alternate !important;
}
@keyframes selectedPulse{
  from{box-shadow:0 0 18px rgba(251,191,36,.34); filter:brightness(1)}
  to{box-shadow:0 0 42px rgba(251,191,36,.75); filter:brightness(1.13)}
}

.option.correct{
  animation:correctWin .65s ease !important;
}
@keyframes correctWin{
  0%{transform:scale(1)}
  45%{transform:scale(1.045)}
  100%{transform:scale(1)}
}

.option.wrong{
  animation:wrongShake .45s ease !important;
}
@keyframes wrongShake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-9px)}
  40%{transform:translateX(9px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}

.cinematic-status{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:9999;
  padding:18px 28px;
  border-radius:999px;
  background:rgba(2,6,23,.82);
  border:1px solid rgba(255,215,0,.45);
  color:var(--gold);
  font-family:'Orbitron',sans-serif;
  font-weight:800;
  letter-spacing:2px;
  text-align:center;
  box-shadow:0 0 55px rgba(255,215,0,.25), 0 0 120px rgba(37,99,235,.20);
  backdrop-filter:blur(12px);
  pointer-events:none;
  animation:statusPop .95s ease forwards;
}
@keyframes statusPop{
  0%{opacity:0; transform:translate(-50%,-50%) scale(.82); filter:blur(8px)}
  18%{opacity:1; transform:translate(-50%,-50%) scale(1.05); filter:blur(0)}
  78%{opacity:1}
  100%{opacity:0; transform:translate(-50%,-50%) scale(.96)}
}

.confetti-piece{
  position:fixed;
  top:-20px;
  z-index:9998;
  pointer-events:none;
  font-size:20px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  to{
    transform:translateY(112vh) rotate(520deg);
    opacity:0;
  }
}

.flash-layer{
  position:fixed;
  inset:0;
  z-index:9997;
  pointer-events:none;
  opacity:0;
}
.flash-layer.good{
  background:radial-gradient(circle, rgba(16,185,129,.26), transparent 58%);
  animation:flash .55s ease;
}
.flash-layer.bad{
  background:radial-gradient(circle, rgba(239,68,68,.30), transparent 58%);
  animation:flash .55s ease;
}
@keyframes flash{
  0%{opacity:0}
  35%{opacity:1}
  100%{opacity:0}
}

.prize-drawer{
  position:fixed;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  width:170px;
  max-height:78vh;
  overflow:auto;
  z-index:30;
  padding:12px;
  border-radius:18px;
  background:rgba(2,6,23,.58);
  border:1px solid rgba(255,215,0,.18);
  backdrop-filter:blur(14px);
  box-shadow:0 0 38px rgba(37,99,235,.12);
}
.prize-row{
  display:flex;
  justify-content:space-between;
  gap:8px;
  padding:5px 8px;
  margin-bottom:3px;
  border-radius:999px;
  color:rgba(255,255,255,.48);
  font-size:12px;
  font-weight:800;
}
.prize-row.safe{
  color:#86efac;
}
.prize-row.done{
  color:var(--gold);
  background:rgba(255,215,0,.07);
}
.prize-row.current{
  color:#111827;
  background:linear-gradient(135deg,var(--gold),var(--gold-soft));
  box-shadow:0 0 18px rgba(255,215,0,.32);
}
@media(max-width:1060px){
  .prize-drawer{display:none}
}

.control-strip{
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
  margin:14px 0 0;
}
.sound-toggle{
  font-size:13px !important;
  padding:9px 12px !important;
}
.icon-btn{
  min-width:46px;
  width:46px;
  height:46px;
  padding:0 !important;
  display:grid;
  place-items:center;
  font-size:22px !important;
  line-height:1;
}
.start-settings-wrap{
  display:flex;
  justify-content:center;
  margin:8px 0 18px;
}
.settings-list{
  display:grid;
  gap:12px;
  margin-top:8px;
}
.settings-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 16px;
  border-radius:18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
}
.settings-row-text{
  display:grid;
  gap:4px;
}
.settings-row-title{
  font-weight:800;
  color:#fff;
}
.settings-row-sub{
  color:#c4b5fd;
  font-size:13px;
}
.settings-toggle-btn{
  white-space:nowrap;
}
.settings-switch{
  min-width:78px;
  height:38px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(148,163,184,.16);
  position:relative;
  cursor:pointer;
  transition:.2s ease;
}
.settings-switch.on{
  background:linear-gradient(135deg, rgba(255,215,0,.85), rgba(255,237,154,.92));
  border-color:rgba(255,215,0,.55);
  box-shadow:0 0 18px rgba(255,215,0,.20);
}
.settings-switch::after{
  content:"";
  position:absolute;
  top:4px;
  left:4px;
  width:28px;
  height:28px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 4px 14px rgba(0,0,0,.28);
  transition:.2s ease;
}
.settings-switch.on::after{
  transform:translateX(40px);
  background:#111827;
}
.final-note{
  margin-top:14px;
  color:rgba(255,255,255,.48);
  text-align:center;
  font-size:12px;
  line-height:1.45;
}

body.lowfx *,
body.lowfx *::before,
body.lowfx *::after{
  animation-duration:.01ms !important;
  animation-iteration-count:1 !important;
  transition-duration:.01ms !important;
}
body.lowfx::before{display:none}
body.lowfx .confetti-piece{display:none}

@media(max-width:720px){
  body::before{display:none}
  .title::after{width:82vw}
  .cinematic-status{width:86vw; font-size:13px; border-radius:18px}
}


/* ===== PHASE 3.1 — PREMIUM POLISH ===== */

.header{
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;
  left:50%;
  top:-130px;
  width:520px;
  height:220px;
  transform:translateX(-50%);
  background:radial-gradient(ellipse at center, rgba(255,215,0,.20), transparent 65%);
  pointer-events:none;
}

.start{
  position:relative;
}
.start::before{
  content:"";
  position:absolute;
  inset:18px;
  border-radius:28px;
  border:1px solid rgba(255,215,0,.10);
  pointer-events:none;
  background:linear-gradient(135deg, rgba(255,255,255,.035), transparent 36%, rgba(255,215,0,.025));
}

.intro-countdown{
  position:fixed;
  inset:0;
  z-index:10000;
  display:grid;
  place-items:center;
  background:radial-gradient(circle at center, rgba(15,23,42,.92), rgba(2,6,23,.98));
  backdrop-filter:blur(8px);
  animation:introOverlayOut .35s ease forwards;
  animation-delay:2.45s;
}
.intro-countdown-number{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(86px,18vw,220px);
  color:var(--gold);
  text-shadow:0 0 32px rgba(255,215,0,.75), 0 0 100px rgba(37,99,235,.35);
  animation:countPulse .8s ease-in-out 3;
}
.intro-countdown-text{
  position:absolute;
  bottom:18%;
  left:50%;
  transform:translateX(-50%);
  color:#c4b5fd;
  letter-spacing:4px;
  font-weight:800;
}
@keyframes countPulse{
  0%{transform:scale(.7);opacity:0;filter:blur(16px)}
  35%{transform:scale(1.08);opacity:1;filter:blur(0)}
  100%{transform:scale(.9);opacity:.35}
}
@keyframes introOverlayOut{
  to{opacity:0;visibility:hidden;pointer-events:none}
}

.question-box.thinking{
  box-shadow:0 0 55px rgba(255,215,0,.23), inset 0 0 35px rgba(255,215,0,.06) !important;
}
.question-box.thinking::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, rgba(255,215,0,.10), transparent 58%);

const PRIZE_FORMATS = {
  az: { locale: "tr-TR", symbol: "₼", position: "after" },

  en: { locale: "en-US", symbol: "$", position: "before" },
  ru: { locale: "ru-RU", symbol: "₽", position: "after" }
};

function formatPrize(value) {
  const cfg = PRIZE_FORMATS[currentLang] || PRIZE_FORMATS.az;
  const number = Number(value || 0).toLocaleString(cfg.locale);
  return cfg.position === "before" ? `${cfg.symbol}${number}` : `${number} ${cfg.symbol}`;
}
function currentPrizes() { return PRIZE_VALUES.map(formatPrize); }
function prizeAt(index) { return formatPrize(PRIZE_VALUES[index] || 0); }
function finalPrize() { return prizeAt(PRIZE_VALUES.length - 1); }
function currentCurrencySymbol() {
  const cfg = PRIZE_FORMATS[currentLang] || PRIZE_FORMATS.az;

}

function byId(id) { return document.getElementById(id); }
function clone(obj) { return JSON.parse(JSON.stringify(obj)); }
function shuffle(arr) {
  const a = arr.slice();
  for(let i=a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function moneyNumber(label) {
  return Number(String(label).replace(/[^0-9]/g, "")) || 0;
}
function getBest() {
  return Number(localStorage.getItem("millionaire_best_score") || 0);
}
function setBest(value) {
  if(value > getBest()) localStorage.setItem("millionaire_best_score", String(value));
  updateStats();
}

function updateStats() {
  const total = ORIGINAL_BANK.reduce((n,l)=>n+l.length,0);

  const best = getBest();
  byId("bestStat").textContent = `${currentLang === 'ru' ? 'Рекорд:' : currentLang === 'en' ? 'Best:' : 'Rekor:'} ${formatPrize(best)}`;
}

function validateBank() {
  const errors = [];
  const seenQuestions = new Set();
  activeBank().forEach((level, li) => {
    if(!Array.isArray(level) || level.length < 1) errors.push(`Level ${li+1}: boş`);
    level.forEach((q, qi) => {
      const label = `Level ${li+1}, soru ${qi+1}`;
      if(!q.q || !Array.isArray(q.opts) || q.opts.length !== 4) errors.push(`${label}: format hatası`);
      if(Array.isArray(q.opts) && new Set(q.opts).size !== q.opts.length) errors.push(`${label}: tekrarlı seçenek`);
      if(!Number.isInteger(q.a) || q.a < 0 || q.a > 3) errors.push(`${label}: cevap index hatası`);
      const key = String(q.q || "").trim().toLowerCase().replace(/\s+/g, " ");
      if(seenQuestions.has(key)) errors.push(`${label}: tekrarlı soru`);
      seenQuestions.add(key);
    });
  });
  return errors;
}

function bankSummary() {
  const total = activeBank().reduce((n, level) => n + level.length, 0);
  const categoryCounts = {};
  activeBank().flat().forEach(q => {
    const c = q.category || categoryOf(q.q);
    categoryCounts[c] = (categoryCounts[c] || 0) + 1;
  });
  return { total, categoryCounts, levelCounts: activeBank().map(l => l.length), errors: validateBank() };
}

function categoryOf(text) {
  const t = text.toLowerCase();
  if(/azərbaycan|türkiye|ülke|paytaxt|başkent|nehir|dağ|okyanus|qitə|kıta/.test(t)) return "🌍 Coğrafya";
  if(/element|atom|dnt|dna|fizik|kimya|biyoloji|gezegen|güneş|planet|elektron/.test(t)) return "🔬 Bilim";
  if(/roman|yazarı|şair|eser|tablo|ressam/.test(t)) return "📚 Kültür";
  if(/savaş|devlet|imparator|yılda|tarix|cumhuriyet|osmanlı/.test(t)) return "🏛️ Tarih";
  if(/html|css|python|api|json|firebase|openai|cpu|ram|websocket|localstorage/.test(t)) return "💻 Teknoloji";
  return "🧠 Genel";
}

function normalizeQuestionText(text) {
  return String(text || "").toLowerCase().replace(/\s+/g, " ").trim();
}

function makeQuestionSet() {
  const usedCategories = [];
  const usedQuestions = new Set();
  return activeBank().map((level, idx) => {
    const pool = shuffle(level);
    const previousCategory = usedCategories[usedCategories.length - 1];
    let picked = pool.find(q => {
      const textKey = normalizeQuestionText(q.q);
      const category = q.category || categoryOf(q.q);
      return !usedQuestions.has(textKey) && category !== previousCategory;
    }) || pool.find(q => !usedQuestions.has(normalizeQuestionText(q.q))) || pool[0];
    const category = picked.category || categoryOf(picked.q);
    usedCategories.push(category);
    usedQuestions.add(normalizeQuestionText(picked.q));
    return { ...clone(picked), level: idx, category };
  });
}

function startGame() {
  clearInterval(timer);
  if(window.MillionaireAudio) window.MillionaireAudio.startBackground();
  showCountdownThen(() => {
    state = {
      level: 0,
      questions: makeQuestionSet(),
      selected: null,
      locked: false,
      revealed: false,
      hiddenOptions: new Set(),
      lifelines: { fifty:true, audience:true, phone:true },
      timeLeft: 30,
      info: ""
    };
    renderGame();
    startTimer();
  });
}

function startTimer() {
  clearInterval(timer);
  state.timeLeft = 30;
  timer = setInterval(() => {
    if(!state || state.locked) return;
    state.timeLeft -= 1;
    if(state.timeLeft <= 0) {
      clearInterval(timer);
      playGameAudio("wrong");
      stopGameAudio("countdown");
      finishGame(false, T("timeout"));
    } else {
      const el = byId("timer");
      if(el) {
        el.textContent = state.timeLeft;
        el.classList.toggle("urgent", state.timeLeft <= 7);
      }
      if(state.timeLeft === 10) playGameAudio("countdown");
      if(state.timeLeft > 10) stopGameAudio("countdown");
    }
  }, 1000);
}

function optionHtml(opt, i) {
  const q = state.questions[state.level];
  let cls = "option premium-option";
  if(state.hiddenOptions.has(i)) cls += " hidden";
  if(state.selected === i && !state.revealed) cls += " selected";
  if(state.revealed && i === q.a) cls += " correct";
  if(state.revealed && state.selected === i && i !== q.a) cls += " wrong";
  return `<button class="${cls}" data-answer="${i}" aria-label="${LETTERS[i]}: ${escapeHtml(opt)}" ${state.locked || state.hiddenOptions.has(i) ? "disabled" : ""}>
    <span class="letter">${LETTERS[i]}</span>
    <span class="answer-text">${escapeHtml(opt)}</span>
    <span class="answer-shine"></span>
  </button>`;
}

function chooseAnswer(index) {
  if(!state || state.locked || state.hiddenOptions.has(index)) return;
  showFinalAnswerModal(index);
}

function lockAnswer(index) {
  if(!state || state.locked || state.hiddenOptions.has(index)) return;
  const q = state.questions[state.level];
  state.selected = index;
  state.locked = true;
  stopGameAudio("countdown");
  
  renderGame();

  // Cavab kilidləndikdən sonra qısa TV-show gözləmə effekti.
  setTimeout(() => {
    stopSuspensePulse();
    state.revealed = true;
    renderGame();

    if(index === q.a) {
      playGameAudio("correct");
      state.info = T("correct");
      
      showResultLine(T("correctBig"), "good");
      showNextQuestionTransition();
      renderGame();
      setTimeout(nextLevel, 1050);
    } else {
      playGameAudio("wrong");
      
      state.info = T("wrong");
      showResultLine(T("wrongBig"), "bad");
      renderGame();
      setTimeout(() => finishGame(false, T("wrong")), 1500);
    }
  }, answerRevealDelay());
}

function answerRevealDelay() {
  return state && state.level >= 14 ? 2800 : 2200;
}

function nextLevel() {
  if(state.level >= PRIZE_VALUES.length - 1) {
    finishGame(true, T("won"));
    return;
  }
  state.level += 1;
  state.selected = null;
  state.locked = false;
  state.revealed = false;
  state.hiddenOptions = new Set();
  state.info = "";
  playGameAudio("next");
  showCinematicStatus(T("next"), "gold");
  renderGame();
  startTimer();
}

function guaranteedMoney() {
  if(state.level > 14) return prizeAt(14);
  if(state.level > 9) return prizeAt(9);
  if(state.level > 4) return prizeAt(4);
  return formatPrize(0);
}

function useLifeline(type) {
  if(!state || state.locked || !state.lifelines[type]) return;
  const q = state.questions[state.level];
  state.lifelines[type] = false;

  if(type === "fifty") {
    showFiftyModalThen(() => {
      const wrong = [0,1,2,3].filter(i => i !== q.a);
      shuffle(wrong).slice(0,2).forEach(i => state.hiddenOptions.add(i));
      state.info = modalText("fiftySub");
      renderGame();
    });
    renderGame();
    return;
  }

  if(type === "audience") {
    const values = buildAudiencePrediction(q.a, state.level);
    state.info = modalText("audienceTitle");
    showAudienceModal(values);
    renderGame();
    return;
  }

  if(type === "phone") {
    state.info = modalText("phoneTitle");
    const suggested = phoneFriendSuggestion(q.a, state.level);
    showPhoneModal(LETTERS[suggested]);
    renderGame();
    return;
  }
}
function probabilityForLevel(level) {
  if(level < 5) return 0.92;
  if(level < 10) return 0.78;
  if(level < 15) return 0.66;
  return 0.56;
}

function phoneFriendSuggestion(correctIndex, level) {
  if(Math.random() < probabilityForLevel(level)) return correctIndex;
  return shuffle([0,1,2,3].filter(i => i !== correctIndex))[0];
}

function buildAudiencePrediction(correctIndex, level) {
  const values = [0,0,0,0];
  const confidence = probabilityForLevel(level);
  const audiencePicksCorrect = Math.random() < Math.max(0.55, confidence - 0.08);
  const leadingIndex = audiencePicksCorrect ? correctIndex : shuffle([0,1,2,3].filter(i => i !== correctIndex))[0];
  const lead = Math.floor((level < 5 ? 52 : level < 10 ? 44 : level < 15 ? 37 : 31) + Math.random()*14);
  values[leadingIndex] = lead;
  let rest = 100 - lead;
  const others = shuffle([0,1,2,3].filter(i => i !== leadingIndex));
  others.forEach((i, idx) => {
    if(idx === others.length - 1) values[i] = rest;
    else {
      const min = 5;
      const max = Math.max(min, rest - (others.length - idx - 1) * min);
      const v = min + Math.floor(Math.random() * (max - min + 1));
      values[i] = v;
      rest -= v;
    }
  });
  return values;
}

function hostLine() {
  if(!state) return "";
  if(state.locked && !state.revealed) return T("locked");
  if(state.revealed) return "";
  const lines = T("host");
  return lines[state.level % lines.length];
}

  document.body.appendChild(overlay);

  let n = 3;
  const number = overlay.querySelector("#countNumber");
  playGameAudio("next");
  const int = setInterval(() => {
    n -= 1;
    if(n > 0){
      number.textContent = n;
      
    } else {
      number.textContent = T("countdownStart");
      
      clearInterval(int);
    }
  }, 800);

  setTimeout(() => {
    overlay.remove();
    callback();
  }, 2850);
}

function burstConfetti(amount = 34) {
  const icons = ["💸","✨","⭐","🟡","🏆"];
  for(let i=0;i<amount;i++){
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.textContent = icons[Math.floor(Math.random()*icons.length)];
    el.style.left = Math.random()*100 + "vw";
    el.style.animationDuration = (1.8 + Math.random()*1.8) + "s";
    el.style.fontSize = (14 + Math.random()*18) + "px";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3800);
  }
}

const legacySoundOn = localStorage.getItem("millionaire_sound") !== "off";
let musicEnabled = localStorage.getItem("millionaire_music") === null ? legacySoundOn : localStorage.getItem("millionaire_music") !== "off";
let sfxEnabled = localStorage.getItem("millionaire_sfx") === null ? legacySoundOn : localStorage.getItem("millionaire_sfx") !== "off";
let lowFx = localStorage.getItem("millionaire_lowfx") === "on";
if(lowFx) document.body.classList.add("lowfx");

function saveAudioPrefs() {
  localStorage.setItem("millionaire_music", musicEnabled ? "on" : "off");
  localStorage.setItem("millionaire_sfx", sfxEnabled ? "on" : "off");
  localStorage.setItem("millionaire_sound", (musicEnabled || sfxEnabled) ? "on" : "off");
  if(window.MillionaireAudio) window.MillionaireAudio.applySoundState();
}

function toggleMusic() {
  musicEnabled = !musicEnabled;
  saveAudioPrefs();
  refreshSettingsModalIfOpen();
}

function toggleSfx() {
  sfxEnabled = !sfxEnabled;
  saveAudioPrefs();
  refreshSettingsModalIfOpen();
}

function toggleFx() {
  lowFx = !lowFx;
  localStorage.setItem("millionaire_lowfx", lowFx ? "on" : "off");
  document.body.classList.toggle("lowfx", lowFx);
  if(state) renderGame(); else renderStart();
  refreshSettingsModalIfOpen();
}

function renderPrizeDrawer() {
  const box = byId("prizeDrawer");
  if(!box) return;
  if(!state){
    box.innerHTML = "";
    return;
  }
  box.innerHTML = currentPrizes().map((p, i) => {
    let cls = "prize-row";
    if(SAFE_LEVELS.has(i)) cls += " safe";
    if(i < state.level) cls += " done";
    if(i === state.level) cls += " current";
    return `<div class="${cls}"><span>${i+1}</span><span>${p}</span></div>`;
  }).reverse().join("");
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[ch]));
}

function playGameAudio(name) {
  if(window.MillionaireAudio && typeof window.MillionaireAudio.play === "function") {
    window.MillionaireAudio.play(name);
  }
}

function stopGameAudio(name) {
  if(window.MillionaireAudio && typeof window.MillionaireAudio.stop === "function") {

}

}

document.addEventListener("click", (e) => {
  const answer = e.target.closest("[data-answer]");
  if(answer) chooseAnswer(Number(answer.dataset.answer));

  const life = e.target.closest("[data-life]");
  if(life) useLifeline(life.dataset.life);

  if(e.target.id === "startBtn") startGame();
  if(e.target.id === "quitBtn") finishGame(false, T("gameOver"));
  if(e.target.id === "settingsBtn") showSettingsModal();
  const settingsAction = e.target.closest("[data-settings-action]");
  if(settingsAction){
    if(settingsAction.dataset.settingsAction === "music") toggleMusic();
    if(settingsAction.dataset.settingsAction === "sfx") toggleSfx();
    if(settingsAction.dataset.settingsAction === "fx") toggleFx();
  }
  if(e.target.id === "prizeBtn") showPrizeModal();
  if(e.target.closest("[data-close-modal]")) closeModal();
  const confirmAnswer = e.target.closest("[data-confirm-answer]");
  if(confirmAnswer) { const idx = Number(confirmAnswer.dataset.confirmAnswer); closeModal(); lockAnswer(idx); }
  if(e.target.closest("[data-close-prize]")) closeModal(".prize-modal-backdrop");
  if(e.target.closest("[data-close-settings]")) closeModal(".settings-modal-backdrop");
  if(e.target.classList.contains("settings-modal-backdrop")) closeModal(".settings-modal-backdrop");
  const langBtn = e.target.closest("[data-lang]");
  if(langBtn){ currentLang = langBtn.dataset.lang; localStorage.setItem("millionaire_lang", currentLang); renderStart(); refreshSettingsModalIfOpen(); }
});

<audio id="introAudio" src="./assets/audio/intro.mp3" preload="auto"></audio>
<audio id="ambientAudio" src="./assets/audio/ambient.mp3" preload="auto" loop></audio>
<audio id="countdownAudio" src="./assets/audio/countdown.mp3" preload="auto"></audio>
<audio id="correctAudio" src="./assets/audio/correct.mp3" preload="auto"></audio>
<audio id="wrongAudio" src="./assets/audio/wrong.mp3" preload="auto"></audio>

<script>
(function(){
  const ids = {
    intro: "introAudio",
    ambient: "ambientAudio",
    countdown: "countdownAudio",
    correct: "correctAudio",
    wrong: "wrongAudio"
  };
  const musicNames = new Set(["intro", "ambient"]);
  const sfxNames = new Set(["countdown", "correct", "wrong"]);
  const volumes = { intro: 0.55, ambient: 0.22, countdown: 0.65, correct: 0.75, wrong: 0.75 };

  function pref(name, fallbackKey){
    const value = localStorage.getItem(name);
    if(value === null && fallbackKey) return localStorage.getItem(fallbackKey) !== "off";
    return value !== "off";
  }

  const manager = {
    unlocked: false,
    get(name){ return document.getElementById(ids[name]); },
    musicOn(){ return pref("millionaire_music", "millionaire_sound"); },
    sfxOn(){ return pref("millionaire_sfx", "millionaire_sound"); },
    isAllowed(name){
      if(musicNames.has(name)) return manager.musicOn();
      if(sfxNames.has(name)) return manager.sfxOn();
      return manager.musicOn() || manager.sfxOn();
    },
    applySoundState(){
      Object.keys(ids).forEach(name => {
        const audio = manager.get(name);
        if(!audio) return;
        audio.volume = volumes[name] ?? 0.55;
        audio.muted = !manager.isAllowed(name);
        if(!manager.isAllowed(name)) {
          try { audio.pause(); if(name !== "ambient") audio.currentTime = 0; } catch(e){}
        }
      });
      if(manager.musicOn() && manager.unlocked) manager.startBackground();
    },
    async unlock(){
      if(manager.unlocked) return;
      manager.unlocked = true;
      manager.applySoundState();
      const list = Object.keys(ids).map(name => manager.get(name)).filter(Boolean);
      for(const audio of list){
        try {
          const oldMuted = audio.muted;
          audio.muted = true;
          await audio.play();
          audio.pause();
          audio.currentTime = 0;
          audio.muted = oldMuted;
        } catch(e){}
      }
      if(manager.musicOn()) {
        manager.play("intro");
        setTimeout(() => manager.startBackground(), 900);
      }
      document.removeEventListener("pointerdown", manager.unlock, true);
      document.removeEventListener("keydown", manager.unlock, true);
    },
    play(name){
      if(name === "next" || name === "select") return;
      if(!manager.isAllowed(name)) return;
      const audio = manager.get(name);
      if(!audio) return;
      try {
        audio.muted = false;
        audio.volume = volumes[name] ?? 0.55;
        audio.pause();
        audio.currentTime = 0;
        audio.play().catch(()=>{});
      } catch(e){}
    },
    stop(name){
      const audio = manager.get(name);
      if(!audio) return;
      try { audio.pause(); audio.currentTime = 0; } catch(e){}
    },
    startBackground(){
      if(!manager.musicOn()) return;
      const audio = manager.get("ambient");
      if(!audio) return;
      try {
        audio.muted = false;
        audio.volume = volumes.ambient;
        audio.loop = true;
        audio.play().catch(()=>{});
      } catch(e){}
    }
  };
  window.MillionaireAudio = manager;
  document.addEventListener("pointerdown", manager.unlock, true);
  document.addEventListener("keydown", manager.unlock, true);
  window.addEventListener("DOMContentLoaded", () => manager.applySoundState());
})();
</script>
