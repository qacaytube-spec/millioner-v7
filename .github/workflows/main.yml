name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Show initial files
        run: |
          echo "Current directory:"
          pwd
          echo "Files in repo:"
          ls -la

      - name: Unzip project if zip exists
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            echo "Zip file found. Extracting..."
            mkdir extracted_project
            unzip -q *.zip -d extracted_project
            echo "Extracted files:"
            find extracted_project -maxdepth 3 -type f -o -type d
          else
            echo "No zip file found. Continuing..."
          fi

      - name: Find Android project
        id: find_project
        run: |
          echo "Searching for Android project..."

          PROJECT_DIR=""

          for dir in $(find . -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -exec dirname {} \;); do
            echo "Checking: $dir"
            if [ -d "$dir/app" ]; then
              PROJECT_DIR="$dir"
              break
            fi
          done

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Android project with app folder not found."
            echo "Repo structure:"
            find . -maxdepth 4 -type d
            exit 1
          fi

          echo "Android project found at: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          cd "${{ steps.find_project.outputs.project_dir }}"
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Milyoner-debug-apk
          path: '**/app/build/outputs/apk/debug/*.apk'
